<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしのAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  :root {
    --ink: #1F286F;
    --panel: #26243B;
    --panel-light: #322F4C;
    --gold: #7BAB4F;
    --gold-dim: #5c8039;
    --rose: #D88C9A;
    --text-main: #F2EFE9;
    --text-dim: #A6A2BE;
    --border: #3D3A57;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--ink);
    color: var(--text-main);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 640px;
    margin: 0 auto;
    background: var(--ink);
    position: relative;
  }

  /* ---- Header / Badge ---- */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .badge-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 0 0 rgba(232,196,104,0.6);
    animation: pulse 2.4s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(232,196,104,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(232,196,104,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,196,104,0); }
  }
  .header-text { flex: 1; min-width: 0; }
  #ai-name {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: 0.2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-top: 1px;
  }
  #settings-btn {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #settings-btn:hover { border-color: var(--gold); color: var(--gold); }
  .user-name {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 110px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ---- Settings panel ---- */
  #settings-panel {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--ink);
    z-index: 20;
    display: none;
    flex-direction: column;
    padding: 22px 20px;
  }
  #settings-panel.open { display: flex; }
  #settings-panel h2 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 22px;
    margin: 0 0 4px;
  }
  #settings-panel .desc {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .field-label {
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: block;
  }
  #name-input, #persona-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-main);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 12px 14px;
    font-size: 14px;
    margin-bottom: 18px;
    resize: none;
  }
  #name-input:focus, #persona-input:focus, #input-box:focus {
    outline: none; border-color: var(--gold);
  }
  #persona-input { height: 140px; line-height: 1.6; }
  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; }
  .preset-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-chip:hover { border-color: var(--rose); color: var(--rose); }
  .settings-actions { margin-top: auto; display: flex; gap: 10px; }
  .btn-primary, .btn-secondary {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .btn-primary { background: var(--gold); color: var(--ink); }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

  /* ---- Messages ---- */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { display: flex; max-width: 84%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .bubble {
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--panel-light);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .bubble {
    background: transparent;
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--text-dim);
    padding: 0 30px;
  }
  .empty-state .glyph {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 15px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 13px; line-height: 1.7; margin: 0; }

  .typing { display: flex; gap: 4px; padding: 6px 2px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{ transform: translateY(0); opacity:0.4;} 30%{ transform: translateY(-4px); opacity:1;} }

  /* ---- Input ---- */
  #input-row {
    display: flex;
    gap: 10px;
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  #input-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text-main);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14.5px;
    padding: 12px 18px;
    resize: none;
    max-height: 120px;
  }
  #send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s, opacity 0.15s;
  }
  #send-btn:active { transform: scale(0.92); }
  #send-btn:disabled { opacity: 0.4; cursor: default; }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ---- Login screen ---- */
  #login-screen {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--ink);
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    width: 100%;
    max-width: 300px;
    text-align: center;
  }
  .login-badge {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .login-desc {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
  }
  #login-password, #login-name {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-main);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    text-align: center;
    margin-bottom: 12px;
  }
  #login-password:focus, #login-name:focus { outline: none; border-color: var(--gold); }
  #login-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  #login-error {
    color: var(--rose);
    font-size: 12px;
    margin-top: 12px;
    display: none;
  }
  #login-error.show { display: block; }
</style>
</head>
<body>
<div id="app">

  <div id="login-screen">
    <div class="login-box">
      <div class="login-badge">tou AI</div>
      <p class="login-desc">お名前とメールアドレスを入力してください</p>
      <input id="login-name" type="text" placeholder="お名前" autocomplete="off">
      <input id="login-password" type="email" placeholder="you@example.com" autocomplete="off">
      <button id="login-btn">入る</button>
      <p id="login-error">お名前と正しいメールアドレスを入力してください</p>
    </div>
  </div>

  <header>
    <div class="badge-dot"></div>
    <div class="header-text">
      <div id="ai-name">tou AI</div>
      <div class="header-sub">by Claude制作</div>
    </div>
    <div id="user-name-display" class="user-name"></div>
    <button id="settings-btn" title="設定">⚙</button>
  </header>

  <div id="settings-panel">
    <h2>AIを設定する</h2>
    <div class="desc">性格を決めてください。会話の途中でもいつでも変更できます。</div>

    <label class="field-label">性格・話し方・役割</label>
    <textarea id="persona-input" placeholder="例: 明るく親しみやすい口調で話す。ユーザーを励ますのが得意。専門用語は使わず、わかりやすい言葉で説明する。"></textarea>

    <div class="presets">
      <div class="preset-chip" data-persona="親しみやすく明るい口調で話す。相手を励ましたり褒めたりするのが得意。絵文字は使わず、温かみのある言葉を選ぶ。">やさしい相談相手</div>
      <div class="preset-chip" data-persona="論理的かつ簡潔に答える。無駄な前置きをせず、要点から話す。専門的な内容も的確に説明する。">効率重視のアシスタント</div>
      <div class="preset-chip" data-persona="ユーモアを交えつつ、フランクな友達口調で話す。タメ口だが失礼にはならない絶妙なバランスを保つ。">フランクな友達</div>
      <div class="preset-chip" data-persona="丁寧語で落ち着いた口調。物事を多角的に整理し、ユーザーが自分で考えを深められるよう問いかけを行う。">思考整理パートナー</div>
    </div>

    <div class="settings-actions">
      <button class="btn-secondary" id="cancel-settings">キャンセル</button>
      <button class="btn-primary" id="save-settings">保存する</button>
    </div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="glyph">はじめまして</div>
      <p>右上の ⚙ から性格を決めたら、<br>下のボックスに話しかけてみてください。</p>
    </div>
  </div>

  <div id="input-row">
    <textarea id="input-box" rows="1" placeholder="メッセージを入力..."></textarea>
    <button id="send-btn">↑</button>
  </div>

</div>

<script>
  const APP_PASSWORD = "touai0713"; // (未使用: メールアドレス方式に変更済み)
  const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  const loginScreen = document.getElementById('login-screen');
  const loginName = document.getElementById('login-name');
  const loginPassword = document.getElementById('login-password');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');

  function tryLogin() {
    const name = loginName.value.trim();
    const email = loginPassword.value.trim();
    if (name && EMAIL_REGEX.test(email)) {
      loginScreen.classList.add('hidden');
      document.getElementById('user-name-display').textContent = name;
    } else {
      loginError.classList.add('show');
      if (!name) loginName.focus(); else loginPassword.focus();
    }
  }
  loginBtn.onclick = tryLogin;
  loginName.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginPassword.focus();
  });
  loginPassword.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });
  loginName.focus();

  const state = {
    name: localStorageFallback('ai_name', 'tou AI'),
    persona: localStorageFallback('ai_persona', '親しみやすく丁寧な口調で話す。ユーザーの話をよく聞き、共感しながら会話する。'),
    history: []
  };

  // NOTE: artifacts cannot use localStorage; keep everything in memory only.
  function localStorageFallback(key, fallback) { return fallback; }

  const nameEl = document.getElementById('ai-name');
  const messagesEl = document.getElementById('messages');
  const emptyStateEl = document.getElementById('empty-state');
  const inputBox = document.getElementById('input-box');
  const sendBtn = document.getElementById('send-btn');

  const settingsPanel = document.getElementById('settings-panel');
  const settingsBtn = document.getElementById('settings-btn');
  const personaInput = document.getElementById('persona-input');

  nameEl.textContent = state.name;
  personaInput.value = state.persona;

  settingsBtn.onclick = () => {
    personaInput.value = state.persona;
    settingsPanel.classList.add('open');
  };
  document.getElementById('cancel-settings').onclick = () => settingsPanel.classList.remove('open');
  document.getElementById('save-settings').onclick = () => {
    state.persona = personaInput.value.trim() || '親しみやすく丁寧な口調で話す。';
    settingsPanel.classList.remove('open');
  };
  document.querySelectorAll('.preset-chip').forEach(chip => {
    chip.onclick = () => { personaInput.value = chip.dataset.persona; };
  });

  inputBox.addEventListener('input', () => {
    inputBox.style.height = 'auto';
    inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
  });
  inputBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.onclick = sendMessage;

  function addBubble(role, text) {
    if (emptyStateEl) emptyStateEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg assistant';
    msg.id = 'typing-indicator';
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputBox.value.trim();
    if (!text) return;
    inputBox.value = '';
    inputBox.style.height = 'auto';
    sendBtn.disabled = true;

    addBubble('user', text);
    state.history.push({ role: 'user', content: text });
    addTyping();

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system: `あなたの名前は「${state.name}」です。以下の性格・話し方に従って一貫してユーザーと会話してください。\n\n${state.persona}`,
          messages: state.history
        })
      });
      const data = await response.json();
      removeTyping();

      const replyText = (data.content || [])
        .map(b => b.type === 'text' ? b.text : '')
        .join('\n')
        .trim() || '(応答を取得できませんでした)';

      addBubble('assistant', replyText);
      state.history.push({ role: 'assistant', content: replyText });
    } catch (err) {
      removeTyping();
      addBubble('assistant', '通信エラーが発生しました。もう一度お試しください。');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      inputBox.focus();
    }
  }
</script>
</body>
</html>
